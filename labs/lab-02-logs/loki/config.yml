# Loki configuration for Lab 02
# Everything persists to /loki which is tmpfs — gone when the container stops.

auth_enabled: false           # no auth in the lab — any client can push/query

server:
  http_listen_port: 3100      # Promtail pushes here, Grafana queries here
  grpc_listen_port: 9096
  log_level: warn             # reduce noise in docker logs

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks    # actual log data stored here
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory           # no external key-value store needed

# Schema defines how Loki stores and indexes data
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb               # TSDB-based index (current default)
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h             # new index shard every 24 hours

# Ingester buffers log lines in memory before writing to chunks on disk
ingester:
  chunk_idle_period: 3m         # close chunk if no new logs for 3 minutes
  max_chunk_age: 30m            # force flush after 30 minutes regardless
  chunk_retain_period: 1m

# Limits — keep them loose for a lab
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 1h    # reject logs older than 1 hour
  allow_structured_metadata: true   # needed for v13 schema

# Disable components not needed for a single-node lab
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules

analytics:
  reporting_enabled: false      # no telemetry back to Grafana Labs
