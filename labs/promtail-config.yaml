server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Scrape all Docker container logs from the host
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the job label
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      # Use compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Keep only containers that have a compose service label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        action: keep
        regex: ".+"
    pipeline_stages:
      # Parse log level from our app's log format
      - regex:
          expression: '.*\[(?P<level>INFO|WARNING|ERROR|DEBUG)\].*'
      - labels:
          level:
