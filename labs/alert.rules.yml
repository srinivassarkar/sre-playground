groups:
  - name: app-alerts
    rules:

      # App is completely unreachable
      - alert: AppDown
        expr: up{job="python-app"} == 0
        for: 30s
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "python-app is DOWN"
          description: "python-app has been unreachable for 30 seconds. Check container logs."

      # High error rate — more than 10% of requests are 5xx
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status="500"}[5m])
          /
          rate(http_requests_total[5m]) * 100 > 10
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High error rate on {{ $labels.endpoint }}"
          description: "Error rate is {{ $value | printf \"%.1f\" }}% over the last 5 minutes."

      # p99 latency above 1 second
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, endpoint)
          ) > 1.0
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High p99 latency on {{ $labels.endpoint }}"
          description: "p99 latency is {{ $value | printf \"%.2f\" }}s — SLO threshold is 1s."

      # Payment errors specifically — business-critical
      - alert: PaymentErrors
        expr: rate(app_errors_total{endpoint="/payments"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          team: payments
        annotations:
          summary: "Payment errors detected"
          description: "Payment gateway errors firing at {{ $value | printf \"%.2f\" }}/s"

  - name: infra-alerts
    rules:

      # Container using more than 80% of its memory limit
      - alert: HighContainerMemory
        expr: |
          (container_memory_usage_bytes{name!=""} /
           container_spec_memory_limit_bytes{name!=""}) * 100 > 80
        for: 2m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High memory usage in container {{ $labels.name }}"
          description: "Container {{ $labels.name }} memory is at {{ $value | printf \"%.1f\" }}%"

      # High CPU on host
      - alert: HighHostCPU
        expr: |
          100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}%"
