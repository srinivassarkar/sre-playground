global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Our Flask app (exposes /metrics via prometheus-client)
  - job_name: "python-app"
    static_configs:
      - targets: ["python-app:5000"]
    metrics_path: /metrics

  # cAdvisor — container-level metrics (CPU, memory per container)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Node Exporter — host-level metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
