server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["lab04-app"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container

      - source_labels: [__meta_docker_container_image]
        target_label: image

      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log

      - target_label: job
        replacement: sre-lab-app

      - target_label: env
        replacement: prod-lab

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream

      - json:
          source: output
          expressions:
            level:    level
            endpoint: endpoint
            status:   status
            duration: duration
            trace_id: trace_id

      - labels:
          level:    ""
          endpoint: ""

      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339

      - output:
          source: output
