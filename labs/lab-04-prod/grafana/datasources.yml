apiVersion: 1

datasources:

  # ── Prometheus ─────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true

  # ── Loki ───────────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      # Derived field: extract trace_id from log lines and link to Tempo.
      # When you click a log line in Grafana, any trace_id value becomes
      # a button that opens the matching trace waterfall in Tempo directly.
      # This is the log → trace correlation link.
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View trace in Tempo"

  # ── Tempo ───────────────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    editable: true
    jsonData:
      # Trace to logs: when viewing a trace in Tempo, Grafana can show
      # matching log lines from Loki side by side using the trace_id.
      # This is the trace → log correlation link (bidirectional).
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{job="sre-lab-app"} | json | trace_id="$${__trace.traceId}"'
      # Trace to metrics: link from a trace to Prometheus metrics
      # for the same time window — see what CPU/error rate looked like
      # during this exact request.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        queries:
          - name: "Error rate during trace"
            query: 'sum(rate(http_requests_total{status="500"}[2m]))'
      nodeGraph:
        enabled: true
      search:
        hide: false
