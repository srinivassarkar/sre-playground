version: "3.9"

networks:
  sre-net:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

services:

  # ── Application ────────────────────────────────────────────────────────────
  python-app:
    build: ./apps/python-app
    container_name: python-app
    ports:
      - "5000:5000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - OTEL_SERVICE_NAME=python-app
    networks:
      - sre-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Load Generator ─────────────────────────────────────────────────────────
  load-generator:
    build: ./apps/load-generator
    container_name: load-generator
    environment:
      - TARGET_URL=http://python-app:5000
    networks:
      - sre-net
    depends_on:
      python-app:
        condition: service_healthy
    restart: unless-stopped

  # ── Alert Webhook (simulates PagerDuty/Slack in lab) ───────────────────────
  alertwebhook:
    build: ./apps/load-generator
    container_name: alertwebhook
    command: ["python", "alert_webhook.py"]
    ports:
      - "5001:5001"
    networks:
      - sre-net
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"   # needed for Tempo metrics generator
      - "--web.enable-lifecycle"
    networks:
      - sre-net
    restart: unless-stopped

  # ── Alertmanager ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - sre-net
    restart: unless-stopped

  # ── Grafana Loki ───────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sre-net
    restart: unless-stopped

  # ── Promtail ───────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock  # read docker container logs
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - sre-net
    restart: unless-stopped
    depends_on:
      - loki

  # ── Grafana Tempo ──────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.0
    container_name: tempo
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./infra/tempo/tempo-config.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml
    networks:
      - sre-net
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - sre-net
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  # ── Node Exporter (host metrics) ───────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - sre-net
    restart: unless-stopped

  # ── cAdvisor (container metrics) ──────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - sre-net
    restart: unless-stopped
